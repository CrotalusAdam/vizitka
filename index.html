<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jakub Matoušek</title>

<style>
:root {
  --bg: #1f1f1f;
  --card: #ffffff;
  --text: #000;
  --accent: #1e90c2;
}

body.light {
  --bg: #f2f2f2;
  --card: #ffffff;
  --text: #000;
}

body.dark {
  --bg: #1f1f1f;
  --card: #2a2a2a;
  --text: #fff;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg);
  font-family: Arial;
  color: var(--text);
}

/* karta */
.card {
  max-width: 340px;
  background: var(--card);
  overflow: hidden;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  position: relative; /* důležité pro trojúhelník */
  padding-top: 30px;
}

.card::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 0;
  height: 0;
  border-top: 80px solid #1e90c2;   /* barva z loga */
  border-left: 80px solid transparent;
}

/* horní banner */
.header {
  padding: 20px;
}

.logo {
  width: 80px;
}

/* profilovka */
.profile {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  margin-top: -50px;
  border: 4px solid var(--card);
}

h1 {
  margin: 10px 0 5px;
  margin-left: 30px;
  margin-right: 30px;
  font-size: 25px;
}

.title {
  color: var(--accent);
  font-weight: bold;
}

.btn {
  display: block;
  padding: 8px 15px;
  background: var(--accent);
  color: white;
  text-decoration: none;
  font-size: 18px;
  margin-top: 15px;
}

.btn:hover {
  opacity: 0.8	;
}

/* přepínač */
.toggle-container {
  position: static;   /* místo fixed */
  margin-top: 10px;
  display: flex;
  justify-content: flex-end;
  padding: 0 15px 15px;
}

.switch {
  position: relative;
  display: inline-block;
  width: 48px;
  height: 22px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #ccc;
  border-radius: 26px;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  transition: .3s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 2px;
  background-color: white;
  border-radius: 50%;
  transition: .3s;
}

input:checked + .slider {
  background-color: var(--accent);
}

input:checked + .slider:before {
  transform: translateX(24px);
}
</style>
</head>

<body class="dark">

<div class="card">
  
  <div class="header">
    <img src="" class="logo">
  </div>

  <img src="jakub.jpeg" class="profile">

  <h1>Jakub Matoušek</h1>
  <p class="title">Solution Consultant</p>
  <p>Technodat</p>
  <p>Zlín, Czechia</p>

  <a href="kontakt.php" class="btn" >
    kontakt
  </a>

<!-- 🔥 přepínač ven z karty -->
<div class="toggle-container">
    <label class="switch">
    <input type="checkbox" onchange="toggleTheme(this)">
    <span class="slider"></span>
  </label>
</div>

</div>

<script>
/* dark/light */
function toggleTheme(el) {
  document.body.className = el.checked ? "light" : "dark";
  localStorage.setItem("theme", document.body.className);
}

/* načtení uloženého režimu */
window.onload = () => {
  const theme = localStorage.getItem("theme") || "dark";
  document.body.className = theme;
  document.querySelector("input").checked = theme === "light";
}
</script>

</body>
</html>
